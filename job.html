DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Job docoment </title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="apply-box">
            <h1>Job Application form for new jobs 2025</h1>
            <form action="">
                <div form-container>
                    <div class="form-control">
                        <label for="first-name">
                            First Name
                        </label>
                        <input id="first-name" name="first-name" placeholder="Enter First Name..." />
                    </div>
                    <div class="form-control">
                        <label for="last-name">
                            Last Name
                        </label>
                        <input id="last-name" name="last-name" placeholder="Enter Last Name..." />
                    </div>
                    <div class="form-control">
                        <label for="email">
                            Email
                        </label>
                        <input type="email" id="email" name="email" placeholder="Enter Email..." />
                    </div>

                    <div class="form-control">
                        <select id="job-role" name="job-role">web page </select>
                            <option value="">Select Job Role</option>
                            <option value="frontend">Frontend Developer</option>
                            <option value="backend">Backend Developer</option>
                            <option value="ui-ux">UI UX Designer</option>
                            <img src="../job interview/download.jpg" alt="">
                             <div class="control">
                        <input type="file" id="upload" name="select" />
                    </div>
                        </select>
                    </div>
                    <div class="textarea-control">
                        <label for="address">
                            Address
                        </label>
                        <textarea name="address" id="address" rows="2" cols="50" placeholder="Enter Address"></textarea>
                    </div>
                    <div class="form-control">
                        <label for="city">
                            City
                        </label>
                        <input id="city" name="city" placeholder="Enter City..." />
                    </div>
                    <div class="form-control">
                        <label for="pincode">
                            Pin Code
                        </label>
                        <input type="number" id="pincode" name="pincode" placeholder="Enter Pin Code..." />
                    </div>
                    <div class="form-control">
                        <label for="date">
                            Date
                        </label>
                        <input value="29-04-2026" type="date" id="date" name="date" />
                    </div>
                    <div class="form-control">
                        <label for="upload">
                            Upload Your CV
                        </label>
                        <input type="file" id="upload" name="upload" />
                    </div>
                </div>    
        </div>
    </div>
      </div>
                <div>
                      <div class="button">
                    <button type="submit">Submit Application form</button>
                </div>
            </form>
                </div>
                <div>
                      <div id="arslan">
                    <button type="submit">Submit your front pic here</button>
                     <div class="control">
                        <input type="file" id="upload" name="upload" />
                    </div>
                </div>
            </form>
                </div>
</body>
<footer>
    <img src = "../job interview/download.jpg" alt = " " height = " 100px" width = "100px">

</footer>
</html>
